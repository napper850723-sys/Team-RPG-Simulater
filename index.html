<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡牌游戏模拟器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            color: #333;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            background-color: #fff;
            padding: 40px 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 800px;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 2em;
        }

        .mode-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .mode-btn {
            padding: 30px 40px;
            font-size: 1.2em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 160px;
            flex: 1;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                padding: 30px 15px;
            }

            h1 {
                font-size: 1.8em;
                margin-bottom: 25px;
            }

            .mode-buttons {
                flex-direction: column;
                align-items: stretch;
            }

            .mode-btn {
                width: 100%;
                padding: 25px 30px;
                font-size: 1.1em;
            }
        }

        /* 横屏模式优化 */
        @media (orientation: landscape) and (max-height: 500px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 20px 15px;
            }

            h1 {
                font-size: 1.5em;
                margin-bottom: 20px;
            }

            .mode-buttons {
                flex-direction: row;
                flex-wrap: wrap;
            }

            .mode-btn {
                padding: 20px 30px;
                font-size: 1em;
                min-width: 140px;
                min-height: 100px;
            }
        }

        .mode-btn-4v4 {
            background-color: #3498db;
            color: white;
        }

        .mode-btn-4v4:hover {
            background-color: #2980b9;
        }

        .mode-btn-1v1 {
            background-color: #e67e22;
            color: white;
        }

        .mode-btn-1v1:hover {
            background-color: #d35400;
        }

        .mode-btn-4v4 {
            background-color: #3498db;
            color: white;
        }

        .mode-btn-4v4:hover {
            background-color: #2980b9;
        }

        .mode-btn-6v6 {
            background-color: #27ae60;
            color: white;
        }

        .mode-btn-6v6:hover {
            background-color: #229954;
        }

        .mode-btn-9v9 {
            background-color: #9b59b6;
            color: white;
        }

        .mode-btn-9v9:hover {
            background-color: #8e44ad;
        }

        .mode-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .mode-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>卡牌游戏模拟器</h1>
        <div class="mode-buttons">
            <button class="mode-btn mode-btn-1v1" onclick="selectMode(1)">
                1V1 模式
            </button>
            <button class="mode-btn mode-btn-4v4" onclick="selectMode(4)">
                4V4 模式
            </button>
            <button class="mode-btn mode-btn-6v6" onclick="selectMode(6)">
                6V6 模式
            </button>
            <button class="mode-btn mode-btn-9v9" onclick="selectMode(9)">
                9V9 模式
            </button>
        </div>
    </div>

    <script>
        function selectMode(mode) {
            localStorage.setItem('gameMode', mode);
            window.location.href = 'select.html';
        }
    </script>
</body>
</html>
